<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>한국의집 주간 스케줄표 작성</title>
  <meta name="description" content="한국의집 주간 스케줄표 작성 포털" />
  <meta name="theme-color" content="#8a5a2b" />

  <link rel="stylesheet" href="style.css?v=2">
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">韓</div>
      <div>
        <strong>한국의집 주간 스케줄표 작성</strong>
        <span>KOREA HOUSE WEEKLY SCHEDULE</span>
      </div>
    </div>

    <div class="top-actions">
      <button type="button" onclick="loadStaffOptions()">🔄 직원목록 새로고침</button>
      <button type="button" onclick="toggleStaffManager()">👥 직원관리</button>
      <button type="button" class="primary" onclick="generateNextWeekSchedule()">📅 다음주 자동생성</button>
      <button type="button" onclick="loadCurrentWeeklySchedule()">📂 저장된 근무표</button>
      <button type="button" onclick="loadPreviousWeekPattern()">📋 전주 패턴 복사</button>
      <button type="button" onclick="saveWeeklySchedule()" class="primary">💾 저장</button>
      <button type="button" onclick="window.print()">🖨️ 인쇄</button>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <div>
        <p class="eyebrow">WEEKLY SCHEDULE PORTAL</p>
        <h1>한국의집 주간 근무표</h1>
        <p>
          현재 구글시트 주간 근무표와 같은 형태로 작성합니다.
          근무스케줄관리에서 D/O인 직원은 해당 날짜의 직원 선택 목록에서 제외됩니다.
        </p>
      </div>

      <div class="week-box">
        <label for="mondayInput">주간 시작일</label>
        <input type="date" id="mondayInput" />
        <div class="week-buttons">
          <button type="button" onclick="setThisWeek()">이번주</button>
          <button type="button" onclick="setNextWeek()">다음주</button>
        </div>
      </div>
    </section>

    <section class="notice">
      <strong>작성 방식</strong>
      <span>구글시트와 동일하게 왼쪽은 구분, 오른쪽은 월~일 직원/시간 칸으로 구성됩니다.</span>
    </section>

    <section id="loadingBox" class="loading hidden">
      직원목록을 불러오는 중입니다...
    </section>

    <section id="staffManager" class="staff-manager hidden">
      <div class="staff-manager-head">
        <h2>직원관리</h2>
        <button type="button" onclick="toggleStaffManager()">닫기</button>
      </div>

      <div class="staff-form">
        <input type="text" id="newStaffName" placeholder="직원명 입력" />

        <select id="newStaffRole">
          <option value="hall">홀직원</option>
          <option value="kitchen">주방직원</option>
          <option value="prep">전처리</option>
          <option value="exit">퇴식</option>
          <option value="wash">설거지</option>
        </select>

        <button type="button" class="primary" onclick="addWeeklyStaff()">
          직원 등록
        </button>

        <button type="button" class="danger" onclick="deleteWeeklyStaffFromForm()">
          직원 퇴사
        </button>
      </div>

      <div id="weeklyStaffList" class="weekly-staff-list"></div>
    </section>

    <section class="table-card">
      <div class="table-head">
        <h2 id="scheduleTitle">한국의집 주간 근무표</h2>
        <p id="dayOffSummary"></p>
      </div>

      <div class="table-scroll">
        <table id="scheduleTable" class="schedule-table">
          <thead id="scheduleHead"></thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    한국의집 주간 스케줄표 작성 포털 · 저장 데이터는 구글시트 원장에 기록됩니다.
  </footer>

  <script src="./script.js"></script>
</body>
</html>
